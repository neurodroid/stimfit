name: Docs

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system packages for docs
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Install Python packages for Sphinx
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r doc/sphinx/requirements.txt

      - name: Build Sphinx HTML
        run: |
          sphinx-build -b html doc/sphinx doc/sphinx/.build/html

      - name: Build Doxygen HTML
        run: |
          mkdir -p doc/doxygen
          cd doc
          doxygen Doxyfile.in

      - name: Assemble Pages artifact
        run: |
          rm -rf site
          mkdir -p site/api
          cp -R doc/sphinx/.build/html/. site/
          cp -R doc/doxygen/html/. site/api/
          cp site/contents.html site/index.html

      - name: Upload assembled site artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site

  deploy:
    name: Publish to gh-pages branch
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download assembled site artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site

      - name: Publish generated site to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          force_orphan: false
          keep_files: false

  publish-wiki:
    name: Sync wiki landing page
    needs: build
    runs-on: ubuntu-latest
    if: ${{ secrets.STIMFIT_WIKI_PUSH_TOKEN != '' }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone wiki repository
        env:
          WIKI_TOKEN: ${{ secrets.STIMFIT_WIKI_PUSH_TOKEN }}
        run: |
          git clone "https://x-access-token:${WIKI_TOKEN}@github.com/neurodroid/stimfit.wiki.git" wiki

      - name: Update wiki landing page content
        run: |
          cp doc/wiki/Stimfit.md wiki/Stimfit.md

      - name: Commit and push wiki updates
        env:
          WIKI_TOKEN: ${{ secrets.STIMFIT_WIKI_PUSH_TOKEN }}
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Stimfit.md; then
            echo "No wiki changes to publish"
            exit 0
          fi
          git add Stimfit.md
          git commit -m "Sync Stimfit wiki landing page from docs workflow"
          git push origin HEAD:master
