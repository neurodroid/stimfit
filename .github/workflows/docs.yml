name: Docs

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system packages for docs
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Install Python packages for Sphinx
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r doc/sphinx/requirements.txt

      - name: Build Sphinx HTML
        run: |
          sphinx-build -b html doc/sphinx doc/sphinx/.build/html

      - name: Build Doxygen HTML
        run: |
          mkdir -p doc/doxygen
          cd doc
          doxygen Doxyfile.in

      - name: Assemble Pages artifact
        run: |
          rm -rf site
          mkdir -p site/api
          cp -R doc/sphinx/.build/html/. site/
          cp -R doc/doxygen/html/. site/api/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy documentation site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
