[DEFAULT]
# CMake packaging currently tracks the CMake migration branch until
# the toolchain lands on master.
upstream-branch = pr/msvc-toolchain-compat
debian-branch = debian/sid

# Tag naming is up to you; these are common and explicit:
upstream-tag = upstream/%(version)s
debian-tag = debian/%(version)s

# Optional: keep a pristine-tar branch for reproducible orig tarballs
pristine-tar = True
pristine-tar-branch = pristine-tar
